<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDG 17: Generative Network Art</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <link rel="stylesheet" href="https://use.typekit.net/wza6swk.css">
<style>
          body,
          html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #FFFFFF;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
          }

          #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
          }

          #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 60% 40%;
            grid-template-rows: 80px 1fr 100px;
            grid-template-areas:
              "topTitle topTitle"
              ". main"
              "bottomQuote bottomQuote";
            padding: 20px;
          }

          .main-content {
            grid-area: main;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 320px;
            max-width: 50%;
            height: fit-content;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.38);
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            font-family: "new-spirit", serif;
            font-weight: 500;
            font-style: normal;
            justify-self: end;
            align-self: center;
            margin-right: 40px;
            pointer-events: auto;
          }

          .top-title {
            grid-area: topTitle;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10px;
          }

          .header-img {
            max-height: 70px;
            width: auto;
            display: block;
          }

          .main-title {
            font-size: 1.3rem;
            margin: 0 0 10px 0;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.3;
            text-align: left;
          }

          .small-body {
            font-family: "mulish-variable", sans-serif;
            font-variation-settings: "wght" 200;
            font-size: 0.85rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            text-align: left;
          }

          .ui-footer-grid {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: stretch;
            padding: 0 40px 40px 40px;
            box-sizing: border-box;
            z-index: 100;

            /* Initial state: Hidden */
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out;
          }

          /* Toggled via p5.js when Intro ends */
          .ui-footer-grid.show-now {
            opacity: 1;
            pointer-events: auto;
          }

          /* --- CENTER AREA --- */
          .footer-quote-area {
            text-align: center;
          }

          .quote-text {
            font-family: "mulish-variable", sans-serif;
            color: rgba(255, 255, 255, 1);
            font-size: clamp(12px, 1.2vw, 14px);
            margin: 0;
          }

          .quote-author {
            font-family: "mulish-variable", sans-serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(12px, 1.2vw, 14px);
            margin: 0;
          }

          /* --- RIGHT AREA (END) --- */
          .footer-nav-area {
            text-align: right; /* Aligns content to the far end */
          }

          .html-next-link {
            font-family: "mulish-variable", sans-serif;
            font-weight: 500; /* Bold as requested */
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            border-bottom: 2px solid rgba(116, 169, 255, 0.4);
            padding-bottom: 4px;
            transition: all 0.1s ease;

            /* Responsive Font Size */
            font-size: 16px;
          }

          .html-next-link:hover {
            color: #ffffff;
            border-bottom-color: rgb(117, 188, 250);
          }

      #header-grid {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        display: grid;
        /* 1fr 3fr 1fr ensures the center is wider and perfectly balanced */
        grid-template-columns: 1fr 3fr 1fr;
        /* 45px matches the 'y' coordinate of icons in JS */
        padding-top: 45px;
        z-index: 50;
        pointer-events: none;
      }

      .grid-center {
        text-align: center;
      }

      #instruction-text {
        font-family: "mulish-variable", sans-serif;
        font-weight: 500;
        /* Same responsive logic as JS */
        font-size: 16px;
        color: rgba(255, 255, 255, 0); /* Hidden */
        margin: 0;
        transition: color 0.8s ease;
      }

      #instruction-text.show-instruction {
        color: rgba(255, 255, 255, 0.9);
      }

      /* Syncing "Next Stage" font size in CSS */
      .html-next-link {
        font-size: 16px; /* Matches ui.fNav */
        font-weight: 700; /* Bold */
      }

          /* --- MOBILE RESPONSIVE --- */
          @media (max-width: 700px) {
            .ui-footer-grid {
              grid-template-columns: 3fr 1fr;
              padding: 0 25px 25px 25px;
              align-items: end;
            }

            .footer-left-space { display: none; }

            .footer-quote-area {
              text-align: left; }

            .quote-text, .quote-author {
              font-size: 12px;
            }

            .html-next-link {
              font-size: 12px; /* Matches your ui.fNav mobile */
              white-space: nowrap; /* Prevents text wrapping */
            }
            #header-grid { padding-top: 30px; }
            #instruction-text { font-size: 12px; }
            .html-next-link { font-size: 12px; }
          }
  </style>
</head>

<body>
  <div id="canvas-container"></div>
  <div id="header-grid">
    <div class="grid-side"></div>
    <div class="grid-center">
      <p id="instruction-text"></p>
    </div>
    <div class="grid-side"></div>
  </div>

<footer id="dynamic-footer" class="ui-footer-grid">
    <div class="footer-left-space"></div>
    
    <div class="footer-quote-area">
      <p class="quote-text">
        “Great things in business are never done by one person; they're done by a team of people.”
      </p>
      <span class="quote-author">by Steve Jobs (2003)</span>
    </div> <div class="footer-nav-area">
      <a href="my.html" class="html-next-link">Next Stage >></a>
    </div>
  </footer>

  <script src="taiyosketch.js"></script>
</body>
</html>
